# Round 1: GlycoKGNet with learnable encoders + hybrid decoder (no BioHGT)
# Full-batch training to validate pipeline and hybrid decoder
# Target: MRR 0.50-0.55 (baseline TransE 400ep: MRR 0.474)
name: glycokgnet_r1
seed: 42
embedding_dim: 256

model:
  name: GlycoKGNet
  embedding_dim: 256
  # Encoders: learnable (no external features yet)
  glycan_encoder_type: learnable
  protein_encoder_type: learnable
  # BioHGT disabled for R1 (full-batch OOM with 2.3M edges)
  num_hgt_layers: 0
  num_hgt_heads: 8
  use_bio_prior: false
  # Cross-modal fusion
  use_cross_modal_fusion: true
  num_fusion_heads: 4
  # Hybrid decoder (DistMult + RotatE + Neural + Poincaré)
  decoder_type: hybrid
  dropout: 0.1
  # Loss
  loss_fn: margin
  margin: 1.0

training:
  epochs: 400
  batch_size: 1024
  lr: 1.0e-3
  weight_decay: 0.0
  optimizer: adam
  scheduler: none
  grad_clip: 1.0
  early_stopping_patience: 30
  eval_every: 10
  relation_balance_alpha: 0.3
  relation_balance_max_weight: 5.0
  max_edges_per_type: 200000

tags:
  - glycokgnet
  - round1
  - hybrid_decoder
  - no_biohgt
