# Round 7c: R6 + BioHGT 1-layer (message passing for location propagation)
# Hypothesis: HGT propagates cellular_location context to protein→glycan prediction
# Base: R6 (tree_mpnn + esm2_site_aware + cellular_location TextEncoder)
# Addition: 1-layer BioHGT for neighbor information propagation
# R4 showed HGT improved protein::has_site 0.002→0.029; now with localized_in edges
name: glycokgnet_inductive_r7c
seed: 42
embedding_dim: 256
output_dir: experiments_v2

model:
  name: GlycoKGNet
  embedding_dim: 256
  glycan_encoder_type: tree_mpnn
  protein_encoder_type: esm2_site_aware
  esm2_cache_path: data_clean/esm2_cache
  site_map_path: data_clean/site_positions_map.pt
  num_hgt_layers: 1
  num_hgt_heads: 8
  hgt_max_edges_per_type: 50000
  use_bio_prior: true
  use_cross_modal_fusion: true
  num_fusion_heads: 4
  decoder_type: hybrid
  dropout: 0.1
  loss_fn: bce
  adversarial_temperature: 0.5
  label_smoothing: 0.05
  inductive: true
  text_node_types:
    - disease
    - cellular_location

data:
  holdout_ratio: 0.15
  inductive_min_degree: 2

training:
  epochs: 400
  batch_size: 512
  lr: 5.0e-4
  weight_decay: 1.0e-5
  optimizer: adam
  scheduler: cosine
  grad_clip: 1.0
  early_stopping_patience: 40
  eval_every: 10
  relation_balance_alpha: 0.5
  relation_balance_max_weight: 5.0
  gradient_accumulation_steps: 4
  max_edges_per_type: 0
  num_negatives: 32
  mixed_precision: true
  amp_dtype: bfloat16
  use_hgt_loader: false

tags:
  - glycokgnet
  - inductive
  - round7c
  - biohgt
  - cellular_location
  - message_passing
