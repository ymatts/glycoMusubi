# Baseline DistMult experiment
name: baseline_distmult
seed: 42
embedding_dim: 256

model:
  name: DistMult
  embedding_dim: 256
  margin: 0.0
  p_norm: 2
  regularization: 1.0e-5
  reg_type: l3

training:
  epochs: 200
  batch_size: 1024
  lr: 1.0e-3
  early_stopping_patience: 20
  eval_every: 10

tags:
  - baseline
  - distmult

