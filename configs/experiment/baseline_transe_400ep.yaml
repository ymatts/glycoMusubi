# Baseline TransE experiment – extended to 400 epochs
name: baseline_transe_400ep
seed: 42
embedding_dim: 256

model:
  name: TransE
  embedding_dim: 256
  margin: 1.0
  p_norm: 2

training:
  epochs: 400
  batch_size: 1024
  lr: 1.0e-3
  early_stopping_patience: 30
  eval_every: 10

tags:
  - baseline
  - transe
  - extended_epochs
