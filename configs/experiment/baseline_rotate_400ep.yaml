# Baseline RotatE experiment – extended to 400 epochs
name: baseline_rotate_400ep
seed: 42
embedding_dim: 256

model:
  name: RotatE
  embedding_dim: 256
  margin: 6.0
  p_norm: 2
  regularization: 1.0e-5
  reg_type: l3

training:
  epochs: 400
  batch_size: 1024
  lr: 1.0e-3
  early_stopping_patience: 30
  eval_every: 10

tags:
  - baseline
  - rotate
  - extended_epochs
